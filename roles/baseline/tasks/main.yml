---
- name: Install baseline packages
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
    update_cache: true
  loop: "{{ baseline_base_packages }}"
  failed_when: false

- name: Remove unwanted packages (best effort)
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: absent
  loop: "{{ baseline_remove_packages_best_effort }}"
  failed_when: false

- name: Install desired packages (best effort)
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
  loop: "{{ baseline_install_packages_best_effort }}"
  failed_when: false

- name: Configure global git settings
  become: false
  community.general.git_config:
    scope: global
    name: "{{ item.name }}"
    value: "{{ item.value }}"
  loop:
    - { name: "log.date", value: "iso" }
    - { name: "push.autoSetupRemote", value: "true" }
    - { name: "core.editor", value: "vim" }
    - { name: "init.defaultBranch", value: "main" }

- name: Ensure Flathub remote exists
  community.general.flatpak_remote:
    name: flathub
    state: present
    flatpakrepo_url: https://flathub.org/repo/flathub.flatpakrepo

- name: Enable RPM Fusion free and nonfree repository
  ansible.builtin.dnf:
    name:
      - "https://download1.rpmfusion.org/free/fedora/rpmfusion-free-release-{{ ansible_distribution_major_version }}.noarch.rpm"
      - "https://download1.rpmfusion.org/nonfree/fedora/rpmfusion-nonfree-release-{{ ansible_distribution_major_version }}.noarch.rpm"
    state: present
    disable_gpg_check: true
  when: ansible_distribution == 'Fedora'
