---
- name: Ensure RPM Fusion repos are available
  ansible.builtin.include_role:
    name: repo_rpmfusion

- name: Install Dropbox and Nautilus extension (RPMFusion)
  ansible.builtin.dnf:
    name:
      - dropbox
      - nautilus-dropbox
    state: present
    update_cache: true
  failed_when: false

- name: Try to install Thunderbird via dnf
  ansible.builtin.dnf:
    name: thunderbird
    state: present
  register: desktop_gnome_thunderbird_dnf
  failed_when: false

- name: Install Thunderbird via Flatpak fallback
  community.general.flatpak:
    name: org.mozilla.Thunderbird
    state: present
  when: desktop_gnome_thunderbird_dnf is failed

- name: Install Obsidian and Vorta via Flatpak
  community.general.flatpak:
    name: "{{ item }}"
    state: present
  loop:
    - md.obsidian.Obsidian
    - com.borgbase.Vorta

- name: Ensure psutil is installed
  ansible.builtin.dnf:
    name: python3-psutil
    state: present

- name: Remove system sounds (optional)
  ansible.builtin.file:
    path: /usr/share/sounds
    state: absent
  when: desktop_gnome_remove_system_sounds | bool

- name: Install dotfiles aliases
  become: false
  block:
    - name: Deploy bash aliases
      ansible.builtin.copy:
        src: "{{ role_path }}/files/dotfiles/bash_aliases"
        dest: "{{ target_home }}/.bash_aliases"
        mode: "0644"

    - name: Ensure .bashrc sources aliases
      ansible.builtin.lineinfile:
        path: "{{ target_home }}/.bashrc"
        line: '[[ -f ~/.bash_aliases ]] && . ~/.bash_aliases'
        create: true
        mode: "0644"
        state: present

    - name: Ensure .zshrc sources aliases
      ansible.builtin.lineinfile:
        path: "{{ target_home }}/.zshrc"
        line: '[[ -f ~/.bash_aliases ]] && source ~/.bash_aliases'
        create: true
        mode: "0644"
        state: present

- name: Set GTK clock format to 24h
  become: false
  become_user: "{{ target_user }}"
  ansible.builtin.command: gsettings set org.gnome.desktop.interface clock-format '24h'
  changed_when: false
  failed_when: false

- name: Show week date in GNOME calendar
  become: false
  become_user: "{{ target_user }}"
  ansible.builtin.command: gsettings set org.gnome.desktop.calendar show-weekdate true
  changed_when: false
  failed_when: false

- name: Switch applications shortcut (as in Ubuntu)
  become: false
  community.general.dconf:
    key: /org/gnome/desktop/wm/keybindings/switch-applications
    value: ['<Super>Tab']

- name: Switch applications backward shortcut (as in Ubuntu)
  become: false
  community.general.dconf:
    key: /org/gnome/desktop/wm/keybindings/switch-applications-backward
    value: ['<Shift><Super>Tab']

- name: Switch windows shortcut (as in Ubuntu)
  become: false
  community.general.dconf:
    key: /org/gnome/desktop/wm/keybindings/switch-windows
    value: ['<Alt>Tab']

- name: Switch windows backward shortcut (as in Ubuntu)
  become: false
  community.general.dconf:
    key: /org/gnome/desktop/wm/keybindings/switch-windows-backward
    value: ['<Shift><Alt>Tab']